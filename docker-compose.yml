# docker-compose.yml
# Cyber Trade WIN - Redis Stack com segurança básica

services:
  redis:
    image: redis:alpine
    container_name: cyber_trade_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass cyber_trade_redis_2026
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cyber_trade_redis_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local